services:

  postgres:
    image: postgres:16-alpine
    container_name: bus_postgres
    environment:
      POSTGRES_USER: bususer
      POSTGRES_PASSWORD: buspass
      POSTGRES_DB: bus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bus_redis
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: bus_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: bus_server
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgres://bususer:buspass@postgres:5432/bus_db
      REDIS_URL: redis://redis:6379
      ELASTIC_URL: http://elasticsearch:9200
    ports:
      - "3000:3000"
    volumes:
      - ./server/src:/app/src # live reload

volumes:
  postgres_data:
  elastic_data:
