services:

  postgres:
    image: postgres:16-alpine
    container_name: bus_postgres
    environment:
      POSTGRES_USER: bususer
      POSTGRES_PASSWORD: buspass
      POSTGRES_DB: bus_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bus_redis
    ports:
      - "6379:6379"

  server:
    build: ./server
    container_name: bus_server
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgres://bususer:buspass@postgres:5432/bus_db
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - ./server/src:/app/src # live reload

volumes:
  postgres_data:
